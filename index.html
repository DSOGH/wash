<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global M340i Wash</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background-color: #121212; color: white; margin: 0; 
        }
        .container { 
            text-align: center; padding: 30px 20px; background: #1e1e1e; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            width: 85%; max-width: 400px; 
        }
        h2 { margin-top: 0; margin-bottom: 5px; }
        p { color: #888; margin-bottom: 20px; font-size: 14px; }
        select {
            width: 100%; padding: 12px; margin-bottom: 20px;
            background: #333; color: white; border: 1px solid #555;
            border-radius: 8px; font-size: 16px; outline: none;
        }
        .info-box {
            background: #2a2a2a; border-radius: 8px; padding: 10px;
            margin-bottom: 20px; font-size: 13px; color: #bbb;
            display: flex; justify-content: space-around;
        }
        button { 
            background-color: #0a84ff; color: white; border: none; 
            padding: 18px 30px; font-size: 18px; border-radius: 12px; 
            cursor: pointer; width: 100%; font-weight: bold; 
            transition: background 0.2s, transform 0.1s; 
        }
        button:active { background-color: #006ee6; transform: scale(0.98); }
        button:disabled { background-color: #333; color: #777; cursor: not-allowed; transform: none; }
        #status { margin-top: 25px; font-size: 14px; color: #aaa; min-height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🧼 Global Wash</h2>
        <p>Select a location to arm the system.</p>
        
        <!-- Location Dropdown -->
        <select id="locationSelect" onchange="armSystem()" disabled>
            <option>Loading locations...</option>
        </select>

        <!-- Hardware Info Display -->
        <div class="info-box">
            <span id="sysLabel">System: --</span>
            <span id="laneLabel">Lane: --</span>
        </div>
        
        <button id="washBtn" onclick="triggerWash()" disabled>System Unarmed</button>
        
        <div id="status">Connecting to XpresWash servers...</div>
    </div>

    <script>
        // --- 1. YOUR API CREDENTIALS ---
        const myAuthToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3ODI0MDUyODcsImh0dHA6Ly9zY2hlbWFzLm1pY3Jvc29mdC5jb20vd3MvMjAwOC8wNi9pZGVudGl0eS9jbGFpbXMvdXNlcmRhdGEiOiJ7XCJDb21wYW55SURcIjoyLFwiQ3VzdG9tZXJJRFwiOlwiMTg0MTkxMFwiLFwiU3lzdGVtQWNjb3VudElEXCI6XCIxODMzOTEwXCIsXCJCeXBhc3NPbkp3dFRva2VuVmFsaWRhdGVkXCI6ZmFsc2UsXCJEZXZpY2VJRFwiOlwiREJGREVFQTUtNkE3NS00ODk5LTlDREEtRTIzN0QyNEM0QTQwXCJ9IiwiaWF0IjoxNzc0NjI5Mjg3LCJpc3MiOiJYWV8yMDQxMl8wIiwibmJmIjoxNzc0NjI5Mjg3fQ.Y1eDAwayCep7SAcJToJhs-tzJ5L1uffM9BkQnAiF5eI";
        const customerTagId = 1999420;
        const billingEntityId = 4414;

        // --- 2. GLOBAL VARIABLES TO STORE HARDWARE IDs ---
        let currentSystemId = null;
        let currentLaneId = null;

        // Base Headers used for all requests
        const reqHeaders = {
            "Accept": "application/json",
            "Content-Type": "application/json",
            "Authorization": `Bearer ${myAuthToken}`
        };

        // --- 3. ON PAGE LOAD: FETCH ALL LOCATIONS ---
        window.onload = async function() {
            try {
                // Fetch the master location list
                const res = await fetch("https://www.xpreswash.com/coreservice/api/location", { headers: reqHeaders });
                if (!res.ok) throw new Error("Failed to load locations");
                const locations = await res.json();

                // Sort alphabetically by name
                locations.sort((a, b) => a.name.localeCompare(b.name));

                // Populate the dropdown
                const select = document.getElementById("locationSelect");
                select.innerHTML = '<option value="">-- Choose a Car Wash --</option>';
                
                locations.forEach(loc => {
                    const option = document.createElement("option");
                    option.value = loc.id;
                    option.textContent = loc.name;
                    select.appendChild(option);
                });

                select.disabled = false;
                document.getElementById("status").innerText = "Ready. Select your location.";
            } catch (error) {
                document.getElementById("status").innerText = "Error loading locations: " + error.message;
                document.getElementById("status").style.color = "#ff453a";
            }
        };

        // --- 4. WHEN A LOCATION IS PICKED: FETCH SYSTEM & LANE ---
        async function armSystem() {
            const locId = document.getElementById("locationSelect").value;
            const btn = document.getElementById("washBtn");
            const statusEl = document.getElementById("status");
            
            // Reset UI
            btn.disabled = true;
            btn.innerText = "Arming System...";
            document.getElementById("sysLabel").innerText = "System: --";
            document.getElementById("laneLabel").innerText = "Lane: --";
            currentSystemId = null; currentLaneId = null;

            if (!locId) {
                btn.innerText = "System Unarmed";
                statusEl.innerText = "Select a location to arm the system.";
                return;
            }

            statusEl.style.color = "#aaa";
            statusEl.innerText = "Fetching hardware IDs...";

            try {
                // Get System ID
                const sysRes = await fetch(`https://www.xpreswash.com/coreservice/api/system/bylocation/${locId}`, { headers: reqHeaders });
                const sysData = await sysRes.json();
                
                // Account for their API sometimes returning an array vs object
                currentSystemId = Array.isArray(sysData) ? sysData[0].id : sysData.id;
                document.getElementById("sysLabel").innerText = `System: ${currentSystemId}`;

                // Get Lane ID
                const laneRes = await fetch(`https://www.xpreswash.com/coreservice/api/system/lanes/${currentSystemId}`, { headers: reqHeaders });
                const laneData = await laneRes.json();
                
                currentLaneId = Array.isArray(laneData) ? laneData[0].laneID : laneData.laneID;
                document.getElementById("laneLabel").innerText = `Lane: ${currentLaneId}`;

                // System is armed and ready
                btn.disabled = false;
                btn.innerText = "ACTIVATE WASH";
                btn.style.backgroundColor = "#32d74b"; // Green
                statusEl.innerText = "Target locked. Ready for the M340i.";

            } catch (error) {
                statusEl.innerText = "Error linking to hardware: " + error.message;
                statusEl.style.color = "#ff453a";
                btn.innerText = "Error";
            }
        }

        // --- 5. THE KILL SHOT: TRIGGER THE WASH ---
        async function triggerWash() {
            if (!currentSystemId || !currentLaneId) return;

            const btn = document.getElementById("washBtn");
            const statusEl = document.getElementById("status");
            
            btn.disabled = true;
            btn.innerText = "Sending Command...";
            statusEl.style.color = "#aaa";
            statusEl.innerText = "Bypassing Bluetooth check... Commencing wash...";

            const payload = {
                "EntryID": 0,
                "SystemID": currentSystemId,
                "LaneID": currentLaneId,
                "CustomerTagID": customerTagId,
                "AddedDate": new Date().toISOString(),
                "UsedDate": null,
                "Status": 0,
                "BillingEntityID": billingEntityId,
                "CustomerTransactionID": null
            };

            try {
                const response = await fetch("https://www.xpreswash.com/coreservice/api/system/pendingappwashv2", {
                    method: "POST",
                    headers: reqHeaders,
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusEl.style.color = "#32d74b";
                    statusEl.innerText = "Success! The bay doors should open.";
                    btn.innerText = "Wash Activated";
                } else {
                    statusEl.style.color = "#ff453a";
                    statusEl.innerText = `Server rejected request. Error Code: ${response.status}`;
                    btn.disabled = false;
                    btn.innerText = "Try Again";
                    btn.style.backgroundColor = "#0a84ff"; // Reset to blue
                }
            } catch (error) {
                statusEl.style.color = "#ff453a";
                statusEl.innerText = `Network error: ${error.message}`;
                btn.disabled = false;
                btn.innerText = "Try Again";
                btn.style.backgroundColor = "#0a84ff"; 
            }
        }
    </script>
</body>
</html>
