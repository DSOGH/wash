<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Fake Stake · Blackjack</title>
<style>
  :root{
    --bg:#0f212e;
    --panel:#1a2c38;
    --panel-2:#213743;
    --raise:#2f4553;
    --line:#2a3f4d;
    --muted:#b1bad3;
    --muted-2:#557086;
    --text:#ffffff;
    --green:#00e701;
    --green-h:#1fff20;
    --green-dim:#0c845a;
    --red:#e63a4f;
    --gold:#f7c948;
    --btc:#f7931a;
    --shadow:0 10px 30px rgba(0,0,0,.45);
    --radius:14px;
    --font:'Inter','Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--font);
    background:radial-gradient(1200px 600px at 50% -10%, #1d3442 0%, var(--bg) 55%);
    color:var(--text);
    min-height:100vh;
    display:flex;flex-direction:column;
    overflow-x:hidden;
  }

  /* ---------- Top bar ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;
    background:rgba(15,33,46,.85);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:30;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.2px;font-size:18px}
  .brand .mark{
    width:30px;height:30px;border-radius:8px;
    background:linear-gradient(135deg,var(--green) 0%, #06b66e 100%);
    display:grid;place-items:center;box-shadow:0 4px 14px rgba(0,231,1,.35);
  }
  .brand .mark svg{width:18px;height:18px;display:block}
  .brand small{display:block;font-size:10px;color:var(--muted-2);font-weight:600;margin-top:-2px;letter-spacing:1.5px}

  .wallet{display:flex;align-items:center;gap:10px}
  .balance{
    display:flex;align-items:center;gap:8px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:10px;padding:7px 12px;font-weight:700;font-variant-numeric:tabular-nums;
  }
  .balance .coin{width:18px;height:18px;flex:0 0 auto}
  .balance .amt{min-width:64px;text-align:right}
  .btn{
    border:none;cursor:pointer;font-family:var(--font);font-weight:700;
    border-radius:10px;transition:transform .06s ease, background .15s ease, filter .15s ease;
  }
  .btn:active{transform:translateY(1px) scale(.99)}
  .btn-green{background:var(--green);color:#003012;padding:9px 16px;font-size:14px}
  .btn-green:hover{background:var(--green-h)}
  .btn-green:disabled{background:#1d3a32;color:#5e8f78;cursor:not-allowed;filter:none}
  .btn-ghost{background:var(--panel-2);color:var(--text);padding:9px 14px;border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--raise)}

  /* ---------- Table ---------- */
  main{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;padding:8px 12px 0}
  .felt{
    width:100%;max-width:820px;flex:1;
    position:relative;display:flex;flex-direction:column;
    justify-content:space-between;
    padding:18px 8px;min-height:0;
  }
  .watermark{
    position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;z-index:0;
  }
  .watermark span{
    font-size:clamp(22px,7vw,52px);font-weight:800;letter-spacing:4px;
    color:#fff;opacity:.035;text-transform:uppercase;white-space:nowrap;
    transform:rotate(-8deg);text-align:center;line-height:1.1;
  }

  .zone{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:10px}
  .zone-label{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted-2);font-weight:700;
    display:flex;align-items:center;gap:8px;
  }
  .pill{
    background:var(--panel);border:1px solid var(--line);border-radius:999px;
    padding:3px 11px;font-size:13px;font-weight:700;color:var(--text);min-width:34px;text-align:center;
    font-variant-numeric:tabular-nums;
  }
  .pill.soft{color:var(--gold)}
  .pill.bust{color:var(--red);border-color:#5b2730}
  .pill.bj{color:var(--green)}

  /* hands row (player can hold many) */
  .hands{display:flex;gap:14px;justify-content:center;align-items:flex-start;flex-wrap:wrap;width:100%}
  .hand{
    display:flex;flex-direction:column;align-items:center;gap:8px;
    padding:8px;border-radius:14px;transition:background .2s, box-shadow .2s;
    position:relative;min-width:96px;
  }
  .hand.active{background:rgba(0,231,1,.06);box-shadow:0 0 0 1px rgba(0,231,1,.35) inset}
  .hand .bet-tag{
    display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:2px 9px;
  }
  .hand .bet-tag .coin{width:13px;height:13px}

  .stack{position:relative;height:120px;display:flex;align-items:center;justify-content:center}
  .cards{display:flex}
  .cards .card{margin-left:-34px}
  .cards .card:first-child{margin-left:0}

  /* ---------- Cards ---------- */
  .card{
    width:74px;height:104px;border-radius:9px;position:relative;flex:0 0 auto;
    background:#fdfdff;color:#0b0b0f;
    box-shadow:0 6px 14px rgba(0,0,0,.45);
    border:1px solid rgba(0,0,0,.12);
    font-weight:800;user-select:none;
  }
  .card.red{color:#e1294b}
  .card .corner{position:absolute;left:6px;top:5px;line-height:.92;text-align:center;font-size:15px}
  .card .corner.br{left:auto;right:6px;top:auto;bottom:5px;transform:rotate(180deg)}
  .card .corner .s{font-size:13px;display:block;margin-top:-1px}
  .card .pip{
    position:absolute;inset:0;display:grid;place-items:center;font-size:38px;opacity:.96;
  }
  .card .face{
    position:absolute;inset:0;display:grid;place-items:center;font-size:30px;font-weight:800;
  }
  .card.back{
    background:
      repeating-linear-gradient(45deg,#16324a 0 7px,#1b3c57 7px 14px);
    border:1px solid #0c2235;
    box-shadow:0 6px 14px rgba(0,0,0,.5);
  }
  .card.back::after{
    content:"";position:absolute;inset:7px;border-radius:6px;
    border:1.5px solid rgba(120,180,255,.25);
    background:
      radial-gradient(circle at 50% 50%, rgba(0,231,1,.10), transparent 60%);
  }
  .card.back::before{
    content:"";position:absolute;left:50%;top:50%;width:20px;height:20px;
    transform:translate(-50%,-50%) rotate(45deg);
    background:linear-gradient(135deg,var(--green),#06b66e);border-radius:4px;opacity:.85;
    box-shadow:0 0 10px rgba(0,231,1,.4);
  }

  @keyframes deal{
    0%{opacity:0;transform:translateY(-34px) translateX(28px) rotate(8deg) scale(.92)}
    100%{opacity:1;transform:none}
  }
  .card.deal{animation:deal .34s cubic-bezier(.2,.9,.25,1) both}
  @keyframes flip{
    0%{transform:rotateY(90deg);filter:brightness(1.4)}
    100%{transform:rotateY(0);filter:none}
  }
  .card.flip{animation:flip .35s ease both;backface-visibility:hidden}

  /* result badge */
  .result-badge{
    position:absolute;top:-14px;left:50%;transform:translateX(-50%) scale(.6);
    padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.6px;
    opacity:0;text-transform:uppercase;white-space:nowrap;z-index:5;
  }
  .result-badge.show{animation:pop .35s cubic-bezier(.2,1.4,.4,1) forwards}
  @keyframes pop{to{opacity:1;transform:translateX(-50%) scale(1)}}
  .result-badge.win{background:var(--green);color:#003012}
  .result-badge.lose{background:#42212a;color:#ff6b81}
  .result-badge.push{background:var(--raise);color:var(--muted)}
  .result-badge.bj{background:var(--gold);color:#3a2a00}

  /* ---------- Controls ---------- */
  .controls{
    width:100%;max-width:820px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;margin:10px 0 14px;padding:14px;box-shadow:var(--shadow);z-index:5;
  }
  .row{display:flex;gap:10px;align-items:stretch}
  .bet-field{flex:1;display:flex;flex-direction:column;gap:6px}
  .bet-field label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted-2);font-weight:700}
  .bet-input{
    display:flex;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:10px;
    overflow:hidden;
  }
  .bet-input .coin{margin:0 8px;width:18px;height:18px}
  .bet-input input{
    flex:1;background:transparent;border:none;color:var(--text);font-family:var(--font);
    font-weight:700;font-size:16px;padding:11px 4px;outline:none;width:100%;font-variant-numeric:tabular-nums;
  }
  .bet-input .mini{
    background:var(--panel-2);border:none;border-left:1px solid var(--line);color:var(--muted);
    font-weight:800;font-size:13px;padding:0 12px;cursor:pointer;align-self:stretch;
  }
  .bet-input .mini:hover{background:var(--raise);color:#fff}

  .quick{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .chip{
    background:var(--panel-2);border:1px solid var(--line);color:var(--muted);
    border-radius:999px;padding:7px 13px;font-weight:700;font-size:13px;cursor:pointer;
  }
  .chip:hover{background:var(--raise);color:#fff}

  .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
  .act{
    padding:14px 6px;border-radius:11px;font-size:14px;font-weight:800;letter-spacing:.3px;
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1;
  }
  .act small{font-size:10px;color:var(--muted-2);font-weight:700;letter-spacing:.5px}
  .act:hover:not(:disabled){background:var(--raise)}
  .act:disabled{opacity:.4;cursor:not-allowed}
  .act.primary{background:var(--green);color:#003012;border-color:transparent}
  .act.primary small{color:#0a5b2c}
  .act.primary:hover:not(:disabled){background:var(--green-h)}

  .deal-btn{width:100%;padding:16px;border-radius:12px;font-size:16px;margin-top:4px}

  .hint{text-align:center;color:var(--muted-2);font-size:12px;margin-top:10px;min-height:16px;font-weight:600}

  /* ---------- Deposit modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(6,16,23,.72);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;z-index:60;padding:18px;
  }
  .overlay.open{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{
    width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.6);overflow:hidden;
    animation:rise .25s cubic-bezier(.2,.9,.25,1) both;
  }
  @keyframes rise{from{transform:translateY(18px) scale(.97);opacity:0}to{transform:none;opacity:1}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
  .modal-head h3{margin:0;font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
  .modal-head .x{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  .modal-body{padding:18px}
  .tabs{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px;margin-bottom:16px}
  .tab{
    flex:1;padding:10px;border-radius:8px;border:none;background:transparent;color:var(--muted);
    font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  }
  .tab.active{background:var(--panel-2);color:#fff}
  .tab svg{width:16px;height:16px}

  .field{margin-bottom:13px}
  .field label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted-2);font-weight:700;margin-bottom:6px}
  .field input{
    width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:#fff;
    font-family:var(--font);font-weight:600;font-size:14px;padding:12px;outline:none;
  }
  .field input:focus{border-color:var(--green-dim)}
  .addr{
    display:flex;align-items:center;gap:10px;background:var(--bg);border:1px dashed var(--line);
    border-radius:10px;padding:11px;font-size:12px;color:var(--muted);word-break:break-all;font-family:ui-monospace,monospace;
  }
  .qr{width:118px;height:118px;margin:0 auto 14px;border-radius:12px;background:#fff;padding:8px;display:grid;place-items:center}
  .qr svg{width:100%;height:100%}
  .amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .amount{
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 4px;
    font-weight:800;cursor:pointer;color:#fff;font-size:14px;text-align:center;
  }
  .amount:hover,.amount.sel{border-color:var(--green);color:var(--green)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .disclaimer{font-size:11px;color:var(--muted-2);text-align:center;margin-top:14px;line-height:1.4}

  /* toast */
  .toast{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);
    background:var(--panel-2);border:1px solid var(--line);color:#fff;font-weight:700;font-size:14px;
    padding:12px 18px;border-radius:12px;box-shadow:var(--shadow);opacity:0;z-index:70;pointer-events:none;
    display:flex;align-items:center;gap:9px;transition:.3s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .coin{width:18px;height:18px}

  @media (max-width:480px){
    .card{width:62px;height:88px}
    .cards .card{margin-left:-30px}
    .stack{height:104px}
    .act{padding:12px 4px;font-size:13px}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 14l4-9 3 6 3-4 4 11" stroke="#012b13" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span>Fake&nbsp;Stake<small>PLAY MONEY · NO REAL VALUE</small></span>
  </div>
  <div class="wallet">
    <div class="balance">
      <svg class="coin" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#f7c948"/><circle cx="12" cy="12" r="8.2" fill="none" stroke="#caa01f" stroke-width="1.4"/><text x="12" y="16.4" text-anchor="middle" font-size="11" font-weight="800" fill="#7a5e00" font-family="Inter,sans-serif">$</text></svg>
      <span class="amt" id="balance">0.00</span>
    </div>
    <button class="btn btn-green" id="openDeposit">Wallet</button>
  </div>
</header>

<main>
  <div class="felt">
    <div class="watermark"><span>Gamble<br>Responsibly</span></div>

    <!-- Dealer -->
    <div class="zone">
      <div class="zone-label">Dealer <span class="pill" id="dealerVal">—</span></div>
      <div class="stack"><div class="cards" id="dealerCards"></div></div>
    </div>

    <!-- Player -->
    <div class="zone" style="margin-bottom:6px">
      <div class="hands" id="playerHands"></div>
      <div class="zone-label">You</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- betting view -->
    <div id="betView">
      <div class="row">
        <div class="bet-field">
          <label>Bet Amount</label>
          <div class="bet-input">
            <svg class="coin" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#f7c948"/><text x="12" y="16.4" text-anchor="middle" font-size="11" font-weight="800" fill="#7a5e00" font-family="Inter,sans-serif">$</text></svg>
            <input id="betInput" type="text" inputmode="decimal" value="1.00" />
            <button class="mini" data-half>½</button>
            <button class="mini" data-double>2×</button>
          </div>
        </div>
      </div>
      <div class="quick">
        <button class="chip" data-set="1">1.00</button>
        <button class="chip" data-set="5">5.00</button>
        <button class="chip" data-set="25">25.00</button>
        <button class="chip" data-set="100">100.00</button>
        <button class="chip" data-max>Max</button>
      </div>
      <button class="btn btn-green deal-btn" id="dealBtn">Deal</button>
    </div>

    <!-- action view -->
    <div id="actionView" style="display:none">
      <div class="actions">
        <button class="act primary" id="hitBtn">Hit<small>+ card</small></button>
        <button class="act" id="standBtn">Stand<small>pass</small></button>
        <button class="act" id="doubleBtn">Double<small>2× bet</small></button>
        <button class="act" id="splitBtn">Split<small>2 hands</small></button>
      </div>
    </div>

    <div class="hint" id="hint">Place a bet to begin.</div>
  </div>
</main>

<!-- Deposit modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2.5" stroke="#b1bad3" stroke-width="1.8"/><path d="M3 10h18" stroke="#b1bad3" stroke-width="1.8"/></svg>
        Deposit · Fake Funds
      </h3>
      <button class="x" id="closeDeposit">&times;</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab active" data-method="btc">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#f7931a"/><path d="M10 7.5h3.1c1.3 0 2.2.7 2.2 1.8 0 .8-.5 1.4-1.2 1.6.9.2 1.5.9 1.5 1.9 0 1.3-1 2.1-2.5 2.1H10V7.5zm1.7 3.1h1.1c.5 0 .8-.3.8-.7s-.3-.7-.8-.7h-1.1v1.4zm0 3h1.3c.6 0 .9-.3.9-.8s-.3-.8-.9-.8h-1.3v1.6z" fill="#fff"/><path d="M11 6v1.5M13 6v1.5M11 15.2v1.5M13 15.2v1.5" stroke="#fff" stroke-width="1.1" stroke-linecap="round"/></svg>
          Bitcoin
        </button>
        <button class="tab" data-method="card">
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="2.2" stroke="#b1bad3" stroke-width="1.8"/><path d="M3 9.5h18" stroke="#b1bad3" stroke-width="1.8"/></svg>
          Card
        </button>
      </div>

      <!-- BTC -->
      <div id="btcPanel">
        <div class="qr" aria-hidden="true">
          <svg viewBox="0 0 100 100" id="qrSvg"></svg>
        </div>
        <div class="field">
          <label>Your Fake BTC Deposit Address</label>
          <div class="addr">bc1q&nbsp;f4k3&nbsp;st4k3&nbsp;d3m0&nbsp;9z7x&nbsp;n0tr34l&nbsp;wallet</div>
        </div>
      </div>

      <!-- Card -->
      <div id="cardPanel" style="display:none">
        <div class="field"><label>Card Number</label><input id="ccNum" placeholder="4242 4242 4242 4242" maxlength="19" /></div>
        <div class="grid2">
          <div class="field"><label>Expiry</label><input id="ccExp" placeholder="12 / 30" maxlength="7" /></div>
          <div class="field"><label>CVC</label><input id="ccCvc" placeholder="123" maxlength="4" /></div>
        </div>
      </div>

      <div class="field" style="margin-top:4px">
        <label>Amount</label>
        <div class="amounts">
          <button class="amount" data-amt="50">50</button>
          <button class="amount sel" data-amt="100">100</button>
          <button class="amount" data-amt="500">500</button>
          <button class="amount" data-amt="1000">1,000</button>
          <button class="amount" data-amt="5000">5,000</button>
          <button class="amount" data-amt="10000">10,000</button>
        </div>
      </div>

      <button class="btn btn-green" id="confirmDeposit" style="width:100%;padding:14px;font-size:15px">Deposit 100.00</button>
      <p class="disclaimer">This is a play-money demo. No real currency, cryptocurrency, or card is processed. For entertainment only — please gamble responsibly.</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
/* ============================================================
   Fake Stake · Blackjack  (play-money demo)
   ============================================================ */

const SUITS = [
  {s:'♠', red:false},
  {s:'♥', red:true},
  {s:'♦', red:true},
  {s:'♣', red:false},
];
const RANKS = [
  {r:'A',v:11},{r:'2',v:2},{r:'3',v:3},{r:'4',v:4},{r:'5',v:5},
  {r:'6',v:6},{r:'7',v:7},{r:'8',v:8},{r:'9',v:9},{r:'10',v:10},
  {r:'J',v:10,face:true},{r:'Q',v:10,face:true},{r:'K',v:10,face:true},
];
const DECKS = 6;
const MIN_BET = 0.10;
const MAX_HANDS = 5;

// ---------- state ----------
let balance = 0;
let shoe = [];
let dealer = [];
let hands = [];          // {cards, bet, done, doubled, fromSplit, isAces, result}
let active = 0;
let phase = 'betting';   // betting | player | dealer | over
let holeHidden = true;
let uid = 0;
const animated = new Set(); // card uids that already played their entrance
const flipped  = new Set(); // hole card uids that already flipped

// ---------- elements ----------
const $ = s => document.querySelector(s);
const balanceEl = $('#balance');
const dealerCardsEl = $('#dealerCards');
const dealerValEl = $('#dealerVal');
const playerHandsEl = $('#playerHands');
const betView = $('#betView');
const actionView = $('#actionView');
const hintEl = $('#hint');
const betInput = $('#betInput');

// ---------- helpers ----------
function fmt(n){ return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function updateBalance(){ balanceEl.textContent = fmt(balance); validateDeal(); }

function buildShoe(){
  shoe = [];
  for(let d=0; d<DECKS; d++)
    for(const su of SUITS)
      for(const ra of RANKS)
        shoe.push({...ra, suit:su.s, red:su.red});
  // Fisher-Yates
  for(let i=shoe.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [shoe[i],shoe[j]] = [shoe[j],shoe[i]];
  }
}
function draw(){
  if(shoe.length < 52) buildShoe();
  const c = shoe.pop();
  c.uid = ++uid;
  return c;
}
function handValue(cards){
  let total=0, aces=0;
  for(const c of cards){ total += c.v; if(c.r==='A') aces++; }
  while(total>21 && aces>0){ total-=10; aces--; }
  return { total, soft: aces>0 };
}
function isNaturalBJ(cards){ return cards.length===2 && handValue(cards).total===21; }

// ============================================================
//  RENDERING
// ============================================================
function cardEl(card, faceDown){
  const el = document.createElement('div');
  if(faceDown){
    el.className = 'card back';
    if(!animated.has(card.uid)){ el.classList.add('deal'); animated.add(card.uid); }
    return el;
  }
  el.className = 'card' + (card.red ? ' red' : '');
  const justFlipped = (!flipped.has(card.uid) && holeWasHiddenFor(card));
  if(!animated.has(card.uid)){ el.classList.add('deal'); animated.add(card.uid); }
  else if(justFlipped){ el.classList.add('flip'); }
  if(justFlipped) flipped.add(card.uid);

  const pip = card.face ? '' : `<div class="pip">${card.suit}</div>`;
  const face = card.face ? `<div class="face">${card.r}<span style="font-size:.6em;margin-left:1px">${card.suit}</span></div>` : '';
  el.innerHTML = `
    <div class="corner">${card.r}<span class="s">${card.suit}</span></div>
    ${pip}${face}
    <div class="corner br">${card.r}<span class="s">${card.suit}</span></div>`;
  return el;
}
// track which card was the dealer hole so we can flip it
let holeCardUid = null;
function holeWasHiddenFor(card){ return card.uid === holeCardUid && !holeHidden; }

function valPill(cards, opts={}){
  const {total, soft} = handValue(cards);
  let cls = 'pill', txt = String(total);
  if(opts.bj){ cls+=' bj'; txt='BJ'; }
  else if(total>21){ cls+=' bust'; }
  else if(soft && total!==21){ cls+=' soft'; txt = (total-10)+'/'+total; }
  return {cls, txt};
}

function render(){
  // dealer
  dealerCardsEl.innerHTML = '';
  dealer.forEach((c,i)=>{
    const down = (i===1 && holeHidden);
    dealerCardsEl.appendChild(cardEl(c, down));
  });
  if(dealer.length===0){ dealerValEl.textContent='—'; dealerValEl.className='pill'; }
  else if(holeHidden){
    const v = handValue([dealer[0]]).total;
    dealerValEl.textContent = v; dealerValEl.className='pill';
  } else {
    const p = valPill(dealer, {bj:isNaturalBJ(dealer)});
    dealerValEl.textContent = p.txt; dealerValEl.className = p.cls;
  }

  // player hands
  playerHandsEl.innerHTML = '';
  hands.forEach((h,i)=>{
    const wrap = document.createElement('div');
    wrap.className = 'hand' + (i===active && phase==='player' && !h.done ? ' active':'');

    const stack = document.createElement('div');
    stack.className = 'stack';
    const cardsDiv = document.createElement('div');
    cardsDiv.className = 'cards';
    h.cards.forEach(c => cardsDiv.appendChild(cardEl(c,false)));
    stack.appendChild(cardsDiv);

    // result badge
    if(h.result){
      const b = document.createElement('div');
      const map = {win:'win',lose:'lose',push:'push',bj:'bj'};
      const label = {win:'Win',lose:'Lose',push:'Push',bj:'Blackjack'}[h.result];
      b.className = 'result-badge show ' + map[h.result];
      b.textContent = label;
      stack.appendChild(b);
    }

    const p = valPill(h.cards, {bj: h.result==='bj' || (isNaturalBJ(h.cards) && !h.fromSplit && hands.length===1)});
    const pill = document.createElement('span'); pill.className=p.cls; pill.textContent=p.txt;

    const tag = document.createElement('div');
    tag.className='bet-tag';
    tag.innerHTML = `<svg class="coin" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#f7c948"/><text x="12" y="16.6" text-anchor="middle" font-size="12" font-weight="800" fill="#7a5e00" font-family="Inter">$</text></svg> ${fmt(h.bet)}`;

    wrap.appendChild(stack);
    wrap.appendChild(pill);
    wrap.appendChild(tag);
    playerHandsEl.appendChild(wrap);
  });
}

// ============================================================
//  GAME FLOW
// ============================================================
function currentBet(){
  let n = parseFloat(betInput.value.replace(/,/g,''));
  if(isNaN(n)) n = MIN_BET;
  return Math.max(MIN_BET, Math.round(n*100)/100);
}
function validateDeal(){
  const b = currentBet();
  $('#dealBtn').disabled = !(phase==='betting' && balance >= b && b>=MIN_BET);
}

function startRound(){
  const bet = currentBet();
  if(balance < bet){ toast('Not enough funds — deposit to play.'); return; }

  balance -= bet;
  updateBalance();

  // reset table
  dealer = []; hands = []; active = 0; holeHidden = true; holeCardUid = null;
  phase = 'player';
  hands.push({cards:[], bet, done:false, doubled:false, fromSplit:false, isAces:false, result:null});

  // initial deal: player, dealer, player, dealer(hole)
  hands[0].cards.push(draw());
  dealer.push(draw());
  hands[0].cards.push(draw());
  dealer.push(draw()); holeCardUid = dealer[1].uid;

  betView.style.display='none';
  actionView.style.display='block';
  render();

  // check for naturals
  const dealerBJ = isNaturalBJ(dealer);
  const playerBJ = isNaturalBJ(hands[0].cards);
  const dealerShowsTen = dealer[0].v>=10 || dealer[0].r==='A';

  if(playerBJ || (dealerBJ && dealerShowsTen)){
    setTimeout(()=>{ holeHidden=false; resolveNaturals(playerBJ, dealerBJ); }, 650);
    return;
  }
  enterHand(0, true);
  hint('Your move.');
}

function resolveNaturals(playerBJ, dealerBJ){
  phase='over';
  render();
  const h = hands[0];
  if(playerBJ && dealerBJ){ h.result='push'; balance += h.bet; toast('Push — both Blackjack.'); }
  else if(playerBJ){ h.result='bj'; const win = h.bet*2.5; balance += win; toast('Blackjack! +'+fmt(h.bet*1.5)); }
  else { h.result='lose'; toast('Dealer Blackjack.'); }
  updateBalance(); render();
  endRound();
}

function enterHand(i, fresh){
  active = i;
  const h = hands[i];
  // a freshly-split hand has 1 card — deal its second
  if(h.fromSplit && h.cards.length===1){ h.cards.push(draw()); }

  // split aces get exactly one card then stand
  if(h.isAces){ h.done = true; }
  // auto-stand on 21
  if(handValue(h.cards).total >= 21){ h.done = true; }

  render();
  if(h.done){ setTimeout(advance, 420); return; }
  if(!fresh) hint('Playing hand '+(i+1)+'.');
  updateActions();
}

function advance(){
  let i = active+1;
  while(i<hands.length && hands[i].done) i++;
  if(i<hands.length){ enterHand(i,false); }
  else { finishPlayer(); }
}

function updateActions(){
  const h = hands[active];
  if(phase!=='player' || !h || h.done){ disableAll(); return; }
  const v = handValue(h.cards).total;
  const two = h.cards.length===2;
  $('#hitBtn').disabled = v>=21;
  $('#standBtn').disabled = false;
  $('#doubleBtn').disabled = !(two && !h.isAces && balance>=h.bet);
  $('#splitBtn').disabled = !(two && h.cards[0].v===h.cards[1].v && hands.length<MAX_HANDS && balance>=h.bet && !h.isAces);
}
function disableAll(){ ['hitBtn','standBtn','doubleBtn','splitBtn'].forEach(id=>$('#'+id).disabled=true); }

// actions
function hit(){
  const h = hands[active]; if(h.done) return;
  h.cards.push(draw());
  render();
  const v = handValue(h.cards).total;
  if(v>21){ h.done=true; h.result='lose'; render(); setTimeout(advance,500); }
  else if(v===21){ h.done=true; setTimeout(advance,400); }
  else updateActions();
}
function stand(){ const h=hands[active]; if(h.done) return; h.done=true; advance(); }
function double(){
  const h = hands[active];
  if(h.done || h.cards.length!==2 || balance<h.bet) return;
  balance -= h.bet; h.bet*=2; h.doubled=true; updateBalance();
  h.cards.push(draw()); render();
  h.done=true;
  if(handValue(h.cards).total>21) h.result='lose';
  render();
  setTimeout(advance,560);
}
function split(){
  const h = hands[active];
  if(h.cards.length!==2 || h.cards[0].v!==h.cards[1].v || hands.length>=MAX_HANDS || balance<h.bet) return;
  const moved = h.cards.pop();           // h now has 1 card
  const isAces = h.cards[0].r==='A';
  h.fromSplit = true; h.isAces = isAces;
  const nh = {cards:[moved], bet:h.bet, done:false, doubled:false, fromSplit:true, isAces, result:null};
  hands.splice(active+1, 0, nh);
  balance -= h.bet; updateBalance();
  enterHand(active, true);               // deals h's 2nd card, handles aces/21
}

function finishPlayer(){
  phase='dealer';
  disableAll();
  holeHidden = false;
  flipped.clear();                       // allow the hole to flip on render
  render();

  const anyAlive = hands.some(h => handValue(h.cards).total<=21);
  if(!anyAlive){ setTimeout(settle, 700); return; }

  hint('Dealer plays.');
  setTimeout(dealerStep, 750);
}
function dealerStep(){
  const {total} = handValue(dealer);
  if(total < 17){
    dealer.push(draw());
    render();
    setTimeout(dealerStep, 650);
  } else {
    setTimeout(settle, 450);
  }
}

function settle(){
  phase='over';
  const dv = handValue(dealer).total;
  const dealerBust = dv>21;
  let net = 0;
  for(const h of hands){
    if(h.result) continue;               // already lost (bust) or natural-resolved
    const pv = handValue(h.cards).total;
    if(pv>21){ h.result='lose'; continue; }
    if(dealerBust || pv>dv){ h.result='win'; balance += h.bet*2; net += h.bet; }
    else if(pv===dv){ h.result='push'; balance += h.bet; }
    else { h.result='lose'; net -= h.bet; }
  }
  updateBalance(); render();

  const w = hands.filter(h=>h.result==='win'||h.result==='bj').length;
  const l = hands.filter(h=>h.result==='lose').length;
  if(hands.length===1){
    const r = hands[0].result;
    toast(r==='win'?'You win! +'+fmt(hands[0].bet):
          r==='push'?'Push.':
          r==='bj'?'Blackjack!':'Dealer wins.');
  } else {
    toast(`Round over — ${w} won · ${l} lost`);
  }
  endRound();
}

function endRound(){
  setTimeout(()=>{
    phase='betting';
    actionView.style.display='none';
    betView.style.display='block';
    hint(balance<MIN_BET ? 'Out of funds — open your wallet to deposit.' : 'Place a bet to begin.');
    validateDeal();
  }, 950);
}

function hint(t){ hintEl.textContent = t; }

// toast
let toastTimer;
function toast(msg){
  $('#toastMsg').textContent = msg;
  const t = $('#toast'); t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ============================================================
//  BET CONTROLS
// ============================================================
function setBet(v){ betInput.value = fmt(Math.max(MIN_BET, v)); validateDeal(); }
betInput.addEventListener('input', validateDeal);
betInput.addEventListener('blur', ()=> setBet(currentBet()));
document.querySelectorAll('[data-set]').forEach(b=> b.addEventListener('click', ()=> setBet(parseFloat(b.dataset.set))));
$('[data-half]').addEventListener('click', ()=> setBet(currentBet()/2));
$('[data-double]').addEventListener('click', ()=> setBet(currentBet()*2));
$('[data-max]').addEventListener('click', ()=> setBet(balance>=MIN_BET?balance:MIN_BET));

$('#dealBtn').addEventListener('click', startRound);
$('#hitBtn').addEventListener('click', hit);
$('#standBtn').addEventListener('click', stand);
$('#doubleBtn').addEventListener('click', double);
$('#splitBtn').addEventListener('click', split);

// keyboard
document.addEventListener('keydown', e=>{
  if(phase==='betting' && e.key==='Enter'){ if(!$('#dealBtn').disabled) startRound(); }
  if(phase!=='player') return;
  if(e.key==='h') hit();
  if(e.key==='s') stand();
  if(e.key==='d' && !$('#doubleBtn').disabled) double();
  if(e.key==='p' && !$('#splitBtn').disabled) split();
});

// ============================================================
//  DEPOSIT MODAL
// ============================================================
const overlay = $('#overlay');
let depMethod = 'btc';
let depAmount = 100;

function openDeposit(){ overlay.classList.add('open'); }
function closeDeposit(){ overlay.classList.remove('open'); }
$('#openDeposit').addEventListener('click', openDeposit);
$('#closeDeposit').addEventListener('click', closeDeposit);
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeDeposit(); });

document.querySelectorAll('.tab').forEach(t=> t.addEventListener('click', ()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  depMethod = t.dataset.method;
  $('#btcPanel').style.display  = depMethod==='btc' ? 'block':'none';
  $('#cardPanel').style.display = depMethod==='card'? 'block':'none';
}));

document.querySelectorAll('.amount').forEach(a=> a.addEventListener('click', ()=>{
  document.querySelectorAll('.amount').forEach(x=>x.classList.remove('sel'));
  a.classList.add('sel');
  depAmount = parseFloat(a.dataset.amt);
  $('#confirmDeposit').textContent = 'Deposit '+fmt(depAmount);
}));

$('#confirmDeposit').addEventListener('click', ()=>{
  balance += depAmount;
  updateBalance();
  closeDeposit();
  toast('Deposited '+fmt(depAmount)+' (fake)');
  hint('Place a bet to begin.');
});

// card input niceties
$('#ccNum').addEventListener('input', e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim();
});
$('#ccExp').addEventListener('input', e=>{
  let v = e.target.value.replace(/\D/g,'').slice(0,4);
  if(v.length>2) v = v.slice(0,2)+' / '+v.slice(2);
  e.target.value = v;
});
$('#ccCvc').addEventListener('input', e=>{ e.target.value = e.target.value.replace(/\D/g,'').slice(0,4); });

// little decorative QR (deterministic random blocks — purely cosmetic)
(function drawQR(){
  const svg = $('#qrSvg'); const n=11; const cell=100/n;
  let seed=7; const rnd=()=>{ seed=(seed*9301+49297)%233280; return seed/233280; };
  let html='';
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    const corner=(x<3&&y<3)||(x>n-4&&y<3)||(x<3&&y>n-4);
    if(corner || rnd()>0.5)
      html+=`<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}" fill="#0f212e"/>`;
  }
  svg.innerHTML=html;
})();

// ============================================================
//  INIT
// ============================================================
buildShoe();
balance = 1000;          // start with a little fake balance so you can play right away
updateBalance();
render();
hint('Place a bet to begin.');
</script>
</body>
