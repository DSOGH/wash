<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huff N' Puff Slot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #e94560;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 10px;
        }

        #slot-machine {
            background-color: #16213e;
            padding: 20px;
            border-radius: 15px;
            border: 4px solid #0f3460;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .stats-board {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 10px;
            background: #0f3460;
            border-radius: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            background: #000;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            position: relative;
            box-sizing: border-box;
            border: 2px solid #333;
            transition: border 0.3s;
        }

        /* The Frame Mechanics */
        .frame-1 { border: 6px solid #ffd700; box-shadow: inset 0 0 15px #ffd700; } /* Straw */
        .frame-2 { border: 6px solid #8b4513; box-shadow: inset 0 0 15px #8b4513; } /* Stick */
        .frame-3 { border: 6px solid #b22222; box-shadow: inset 0 0 15px #b22222; background: rgba(178, 34, 34, 0.3); } /* Brick */

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            transition: transform 0.1s, background-color 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        #message-box {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            height: 30px;
        }

        #free-spins-alert {
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <h1>🐺 Huff N' Puff 🐷</h1>

    <div id="slot-machine">
        <div class="stats-board">
            <div>Credits: $<span id="credits">1000</span></div>
            <div>Bet: $10</div>
        </div>

        <div class="grid" id="grid">
            <!-- JS will populate this -->
        </div>

        <div class="controls">
            <div id="free-spins-alert"></div>
            <button id="spin-btn" onclick="spin()">SPIN</button>
        </div>
    </div>

    <div id="message-box">Ready to play! Look out for Hard Hats.</div>

    <script>
        const symbols = ['🐷', '🧰', '📏', '🅰️', '🍒', '🐺', '👷', '👷']; // Doubled Hard Hats for better odds in this demo
        const betAmount = 10;
        let credits = 1000;
        let isSpinning = false;
        let freeSpinsLeft = 0;
        
        // 5 columns, 3 rows arrays
        let grid = Array(5).fill().map(() => Array(3).fill('🐷'));
        let frames = Array(5).fill().map(() => Array(3).fill(0)); // 0 = None, 1 = Straw, 2 = Stick, 3 = Brick

        const gridEl = document.getElementById('grid');
        const creditsEl = document.getElementById('credits');
        const msgEl = document.getElementById('message-box');
        const spinBtn = document.getElementById('spin-btn');
        const fsAlert = document.getElementById('free-spins-alert');

        function logMessage(msg) {
            msgEl.innerText = msg;
        }

        function renderGrid() {
            gridEl.innerHTML = '';
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    // Apply frame styling based on the level
                    if (frames[c][r] === 1) cell.classList.add('frame-1'); // Straw
                    if (frames[c][r] === 2) cell.classList.add('frame-2'); // Stick
                    if (frames[c][r] === 3) cell.classList.add('frame-3'); // Brick
                    
                    cell.innerText = grid[c][r];
                    gridEl.appendChild(cell);
                }
            }
            creditsEl.innerText = credits;
            fsAlert.innerText = freeSpinsLeft > 0 ? `FREE SPINS: ${freeSpinsLeft}` : '';
        }

        function spin() {
            if (isSpinning) return;

            if (freeSpinsLeft === 0) {
                if (credits < betAmount) {
                    logMessage("Not enough credits!");
                    return;
                }
                credits -= betAmount;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            logMessage(freeSpinsLeft > 0 ? "Free Spin in progress..." : "Spinning...");

            let spinsLeft = 15; // Quick rapid animation loop
            
            let spinInterval = setInterval(() => {
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 5; c++) {
                        grid[c][r] = symbols[Math.floor(Math.random() * symbols.length)];
                    }
                }
                renderGrid();
                spinsLeft--;

                if (spinsLeft <= 0) {
                    clearInterval(spinInterval);
                    finalizeSpin();
                }
            }, 60);
        }

        function finalizeSpin() {
            let hatCount = 0;
            let winAmount = 0;

            // Step 1: Lock in Hard Hats and upgrade frames
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 5; c++) {
                    if (grid[c][r] === '👷') {
                        hatCount++;
                        if (frames[c][r] < 3) {
                            frames[c][r]++; // Upgrade Frame: None -> Straw -> Stick -> Brick
                        }
                    }
                }
            }
            
            // Basic matching win logic for base game (3 in a row horizontally)
            for (let r = 0; r < 3; r++) {
                if (grid[0][r] === grid[1][r] && grid[1][r] === grid[2][r] && grid[0][r] !== '👷') {
                    winAmount += betAmount * 2;
                }
            }

            renderGrid();

            if (winAmount > 0 && freeSpinsLeft === 0) {
                credits += winAmount;
                logMessage(`Matched a line! Won $${winAmount}`);
            } else {
                logMessage("");
            }

            // Step 2: Check for Bonus Trigger
            if (hatCount >= 6 && freeSpinsLeft === 0) {
                logMessage("🚨 6+ HATS! 6 FREE SPINS TRIGGERED! 🚨");
                freeSpinsLeft = 6;
                setTimeout(() => { isSpinning = false; spinBtn.disabled = false; }, 1500);
                return; // Stop standard flow
            }

            // Step 3: Handle Free Spin Progression
            if (freeSpinsLeft > 0) {
                freeSpinsLeft--;
                if (freeSpinsLeft === 0) {
                    renderGrid();
                    setTimeout(wolfBlowDownPhase, 1500); // Trigger the grand finale
                } else {
                    isSpinning = false;
                    spinBtn.disabled = false;
                }
            } else {
                isSpinning = false;
                spinBtn.disabled = false;
            }
        }

        function wolfBlowDownPhase() {
            logMessage("🐺 THE BIG BAD WOLF HUFFS AND PUFFS! 🐺");
            let totalBonus = 0;

            // Calculate payout based on the strength of the frames built
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 5; c++) {
                    if (frames[c][r] === 1) totalBonus += betAmount * 2;   // Straw House = 2x Bet
                    if (frames[c][r] === 2) totalBonus += betAmount * 10;  // Stick House = 10x Bet
                    if (frames[c][r] === 3) totalBonus += betAmount * 50;  // Brick House = 50x Bet
                    
                    frames[c][r] = 0; // Clear the frames as they are blown down
                }
            }

            credits += totalBonus;
            renderGrid();
            logMessage(`🐺 The Wolf blew down the houses! You won $${totalBonus}! 💸`);
            
            isSpinning = false;
            spinBtn.disabled = false;
        }

        // Initialize board
        renderGrid();
    </script>
</body>
</html>
