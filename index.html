<!DOCTYPE html>
<html>
<head>
    <title>Fire Stick Silent Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #111; color: #fff; padding-top: 50px; }
        button { background: #ff9900; border: none; color: white; padding: 20px 40px; font-size: 24px; font-weight: bold; border-radius: 10px; margin: 20px; cursor: pointer; }
        button:active { background: #cc7a00; }
        input { padding: 10px; font-size: 18px; text-align: center; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <h2>Fire Stick Master Volume Muffle</h2>
    <input type="text" id="ip" value="192.168.1.X" placeholder="FireStick IP Address"><br><br>
    
    <!-- This button forces the hidden Android internal volume down -->
    <button onclick="sendVolumeDown()">FORCE QUIETER</button>

    <script>
        function sendVolumeDown() {
            const ip = document.getElementById('ip').value;
            // Keyevent 25 is the hardcoded Android system code for Internal Volume Down
            const adbUrl = `http://${ip}:5555/`; 
            
            // We loop it 15 times to absolutely crush the volume to 0, then you can raise your TV safely
            for(let i = 0; i < 15; i++) {
                fetch(adbUrl, {
                    method: 'POST',
                    body: JSON.stringify({ "command": "shell:input keyevent 25" }),
                    mode: 'no-cors'
                }).catch(err => console.log("Sending command..."));
            }
            alert("Sent 15 internal volume down commands!");
        }
    </script>
</body>
</html>
