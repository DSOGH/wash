<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M340i Wash Trigger</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #121212; 
            color: white; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            padding: 30px 20px; 
            background: #1e1e1e; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            width: 85%; 
            max-width: 350px; 
        }
        h2 { margin-top: 0; margin-bottom: 5px; }
        p { color: #888; margin-bottom: 30px; font-size: 14px; }
        button { 
            background-color: #0a84ff; 
            color: white; 
            border: none; 
            padding: 18px 30px; 
            font-size: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            transition: background 0.2s, transform 0.1s; 
        }
        button:active { background-color: #006ee6; transform: scale(0.98); }
        button:disabled { background-color: #333; color: #777; cursor: not-allowed; transform: none; }
        #status { 
            margin-top: 25px; 
            font-size: 14px; 
            color: #aaa; 
            word-wrap: break-word; 
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🧼 XpresWash</h2>
        <p>Location 59 | Lane 113</p>
        
        <button id="washBtn" onclick="triggerWash()">Activate Wash</button>
        
        <div id="status">Ready for the M340i.</div>
    </div>

    <script>
        // Your specific token from the proxy capture
        const myAuthToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3ODI0MDUyODcsImh0dHA6Ly9zY2hlbWFzLm1pY3Jvc29mdC5jb20vd3MvMjAwOC8wNi9pZGVudGl0eS9jbGFpbXMvdXNlcmRhdGEiOiJ7XCJDb21wYW55SURcIjoyLFwiQ3VzdG9tZXJJRFwiOlwiMTg0MTkxMFwiLFwiU3lzdGVtQWNjb3VudElEXCI6XCIxODMzOTEwXCIsXCJCeXBhc3NPbkp3dFRva2VuVmFsaWRhdGVkXCI6ZmFsc2UsXCJEZXZpY2VJRFwiOlwiREJGREVFQTUtNkE3NS00ODk5LTlDREEtRTIzN0QyNEM0QTQwXCJ9IiwiaWF0IjoxNzc0NjI5Mjg3LCJpc3MiOiJYWV8yMDQxMl8wIiwibmJmIjoxNzc0NjI5Mjg3fQ.Y1eDAwayCep7SAcJToJhs-tzJ5L1uffM9BkQnAiF5eI";
        const targetUrl = "https://www.xpreswash.com/coreservice/api/system/pendingappwashv2";

        async function triggerWash() {
            const btn = document.getElementById("washBtn");
            const statusEl = document.getElementById("status");
            
            // UI Feedback during request
            btn.disabled = true;
            btn.innerText = "Sending Command...";
            statusEl.style.color = "#aaa";
            statusEl.innerText = "Connecting to servers...";

            // The JSON Payload exactly as it appeared in your proxy
            const payload = {
                "EntryID": 0,
                "SystemID": 113,
                "LaneID": 1,
                "CustomerTagID": 1999420,
                "AddedDate": new Date().toISOString(),
                "UsedDate": null,
                "Status": 0,
                "BillingEntityID": 4414,
                "CustomerTransactionID": null
            };

            try {
                const response = await fetch(targetUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept-Language": "en-US,en;q=0.9",
                        "Authorization": `Bearer ${myAuthToken}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusEl.style.color = "#32d74b"; // iOS Green
                    statusEl.innerText = "Success! The bay should be active.";
                    btn.innerText = "Wash Activated";
                } else {
                    statusEl.style.color = "#ff453a"; // iOS Red
                    statusEl.innerText = `Server rejected request. Error Code: ${response.status}`;
                    btn.disabled = false;
                    btn.innerText = "Try Again";
                }
            } catch (error) {
                statusEl.style.color = "#ff453a";
                statusEl.innerText = `Network error: ${error.message}`;
                btn.disabled = false;
                btn.innerText = "Try Again";
            }
        }
    </script>
</body>
</html>
